<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1240 360"
  width="1240"
  height="360"
  role="img"
  aria-labelledby="diagram-title diagram-desc"
>
  <title id="diagram-title">Document-to-Knowledge Pipeline</title>
  <desc id="diagram-desc">
    A scanned PDF is processed with visual-language-model OCR and photo extraction.
    Content is optionally translated, ingested, and published as an interlinked wiki
    with citations, supporting browsing, AI clients, and static-site output.
  </desc>

  <defs>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur" />
      <feOffset in="blur" dx="0" dy="3" result="offsetBlur" />
      <feFlood flood-color="#0f172a" flood-opacity="0.12" result="shadowColor" />
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow" />
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <marker
      id="arrowhead"
      markerWidth="10"
      markerHeight="10"
      refX="9"
      refY="5"
      orient="auto"
      markerUnits="userSpaceOnUse"
    >
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b" />
    </marker>

    <style>
      .canvas { fill: #f8fafc; }
      .title {
        font: 700 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #0f172a;
      }
      .subtitle {
        font: 400 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #64748b;
      }
      .card {
        stroke-width: 2;
        filter: url(#shadow);
      }
      .node-title {
        font: 700 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-anchor: middle;
      }
      .node-subtitle {
        font: 500 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-anchor: middle;
      }
      .connector {
        fill: none;
        stroke: #64748b;
        stroke-width: 2.25;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrowhead);
      }
      .branch {
        fill: none;
        stroke: #94a3b8;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .route-label {
        font: 700 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #475569;
        text-anchor: middle;
      }
      .route-chip {
        fill: #ffffff;
        stroke: #cbd5e1;
      }
      .output-card {
        fill: #ffffff;
        stroke: #cbd5e1;
        stroke-width: 1.5;
        filter: url(#shadow);
      }
      .output-title {
        font: 650 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #334155;
        text-anchor: middle;
      }
    </style>
  </defs>

  <rect class="canvas" width="1240" height="360" rx="18" />

  <text class="title" x="30" y="34">Document-to-Knowledge Pipeline</text>
  <text class="subtitle" x="30" y="54">From scanned source material to a cited, queryable knowledge system</text>

  <!-- Scanned PDF -->
  <g>
    <rect class="card" x="30" y="120" width="150" height="72" rx="14" fill="#fff1f2" stroke="#f43f5e" />
    <text class="node-title" x="105" y="151" fill="#9f1239">Scanned PDF</text>
    <text class="node-subtitle" x="105" y="171" fill="#be123c">Source document</text>
  </g>

  <path class="connector" d="M180 156 H218" />

  <!-- OCR and media extraction -->
  <g>
    <rect class="card" x="230" y="110" width="220" height="92" rx="14" fill="#f0fdf4" stroke="#22c55e" />
    <text class="node-title" x="340" y="143" fill="#166534">VLM OCR</text>
    <text class="node-subtitle" x="340" y="164" fill="#15803d">Text recognition + layout</text>
    <text class="node-subtitle" x="340" y="181" fill="#15803d">Photo extraction</text>
  </g>

  <path class="connector" d="M450 156 H468" />

  <!-- Translation decision -->
  <g>
    <path class="card" d="M520 101 L575 156 L520 211 L465 156 Z" fill="#fffbeb" stroke="#f59e0b" />
    <text class="node-title" x="520" y="145" fill="#92400e">Translate?</text>
    <text class="node-subtitle" x="520" y="165" fill="#b45309">
      <tspan x="520" dy="0">Language</tspan>
      <tspan x="520" dy="15">check</tspan>
    </text>
  </g>

  <!-- Yes branch -->
  <path class="connector" d="M520 101 V72 H608" />
  <g transform="translate(548 58)">
    <rect class="route-chip" x="0" y="0" width="38" height="20" rx="10" />
    <text class="route-label" x="19" y="14">Yes</text>
  </g>

  <g>
    <rect class="card" x="620" y="42" width="180" height="60" rx="14" fill="#fff7ed" stroke="#fb923c" />
    <text class="node-title" x="710" y="68" fill="#9a3412">Translate Text</text>
    <text class="node-subtitle" x="710" y="87" fill="#c2410c">Preserve meaning + structure</text>
  </g>

  <path class="connector" d="M710 102 V118" />

  <!-- No branch -->
  <path class="connector" d="M575 156 H608" />
  <g transform="translate(575 130)">
    <rect class="route-chip" x="0" y="0" width="34" height="20" rx="10" />
    <text class="route-label" x="17" y="14">No</text>
  </g>

  <!-- Ingest -->
  <g>
    <rect class="card" x="620" y="120" width="180" height="72" rx="14" fill="#f0f9ff" stroke="#0ea5e9" />
    <text class="node-title" x="710" y="151" fill="#075985">Ingest</text>
    <text class="node-subtitle" x="710" y="171" fill="#0369a1">Normalize + enrich</text>
  </g>

  <path class="connector" d="M800 156 H828" />

  <!-- Interlinked wiki -->
  <g>
    <rect class="card" x="840" y="110" width="240" height="92" rx="14" fill="#eef2ff" stroke="#6366f1" />
    <text class="node-title" x="960" y="143" fill="#3730a3">Interlinked Wiki</text>
    <text class="node-subtitle" x="960" y="164" fill="#4f46e5">Entities, links, and citations</text>
    <text class="node-subtitle" x="960" y="181" fill="#4f46e5">Searchable knowledge graph</text>
  </g>

  <!-- Output fan-out -->
  <path class="branch" d="M960 202 V246 H710" />
  <path class="branch" d="M960 246 H1110" />
  <path class="connector" d="M710 246 V273" />
  <path class="connector" d="M910 246 V273" />
  <path class="connector" d="M1110 246 V273" />

  <g>
    <rect class="output-card" x="620" y="285" width="180" height="46" rx="12" />
    <text class="output-title" x="710" y="313">Browse / Query / Chat</text>
  </g>

  <g>
    <rect class="output-card" x="820" y="285" width="180" height="46" rx="12" />
    <text class="output-title" x="910" y="313">MCP AI Client</text>
  </g>

  <g>
    <rect class="output-card" x="1020" y="285" width="180" height="46" rx="12" />
    <text class="output-title" x="1110" y="313">Static Site</text>
  </g>
</svg>
